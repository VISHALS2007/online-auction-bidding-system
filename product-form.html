<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Mini Project</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="product-form.css">
</head>
<body>
    <div class="container">
        
            <div class="form-header">
                <button class="back-btn" onclick="goBack()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/>
                    </svg>
                    Back to Dashboard
                </button>
                <h1>📦 Product Details</h1>
                <p>Add your product information for auction</p>
            </div>
            <div class="product-form-container"></div>
            <form class="product-form" id="productForm">
                <!-- Basic Product Information -->
                <div class="form-section">
                    <h4>📦 Basic Product Information</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="productName">Product Name *</label>
                            <input type="text" id="productName" name="productName" required>
                        </div>
                        <div class="form-group">
                            <label for="quantity">Quantity *</label>
                            <input type="number" id="quantity" name="quantity" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="rate">Rate (Starting Bid) *</label>
                            <input type="number" id="rate" name="rate" min="0" step="0.01" required>
                        </div>
                    </div>
                </div>

                <!-- Product Images -->
                <div class="form-section">
                    <h4>🖼️ Product Images</h4>
                    <div class="image-upload-area">
                        <input type="file" id="productImages" name="productImages" multiple accept="image/*" style="display: none;">
                        <div class="upload-zone" onclick="document.getElementById('productImages').click()">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
                            </svg>
                            <p>Click to upload product images</p>
                            <span>Multiple photos supported</span>
                        </div>
                        <div id="imagePreview" class="image-preview"></div>
                    </div>
                </div>

                <!-- Product Description -->
                <div class="form-section">
                    <h4>📝 Product Description</h4>
                    <div class="form-group">
                        <label for="description">Detailed Description *</label>
                        <textarea id="description" name="description" rows="4" required placeholder="Describe your product in detail..."></textarea>
                    </div>
                </div>

                <!-- Auction Details -->
                <div class="form-section">
                    <h4>⏱️ Auction Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="auctionEndTime">Auction End Time *</label>
                            <input type="datetime-local" id="auctionEndTime" name="auctionEndTime" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category *</label>
                            <select id="category" name="category" required>
                                <option value="">Select Category</option>
                                <option value="electronics">Electronics</option>
                                <option value="art">Art & Collectibles</option>
                                <option value="cars">Cars & Vehicles</option>
                                <option value="jewelry">Jewelry & Watches</option>
                                <option value="fashion">Fashion & Accessories</option>
                                <option value="home">Home & Garden</option>
                                <option value="sports">Sports & Recreation</option>
                                <option value="books">Books & Media</option>
                                <option value="antiques">Antiques</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Seller Information -->
                <div class="form-section">
                    <h4>👤 Seller Information</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="sellerName">Seller Name *</label>
                            <input type="text" id="sellerName" name="sellerName" required>
                        </div>
                        <div class="form-group">
                            <label for="sellerEmail">Contact Email *</label>
                            <input type="email" id="sellerEmail" name="sellerEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="sellerPhone">Contact Phone</label>
                            <input type="tel" id="sellerPhone" name="sellerPhone">
                        </div>
                    </div>
                </div>

                <!-- Additional Details -->
                <div class="form-section">
                    <h4>🏷️ Additional Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="condition">Product Condition *</label>
                            <select id="condition" name="condition" required>
                                <option value="">Select Condition</option>
                                <option value="new">New</option>
                                <option value="like-new">Like New</option>
                                <option value="good">Good</option>
                                <option value="fair">Fair</option>
                                <option value="poor">Poor</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="shippingCost">Shipping Cost</label>
                            <input type="number" id="shippingCost" name="shippingCost" min="0" step="0.01">
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Create Product Listing</button>
                    <button type="button" class="preview-btn" onclick="previewProduct()">Preview Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Product Preview Modal -->
    <div id="productPreviewModal" class="product-preview" style="display: none;">
        <div class="preview-content">
            <div class="preview-header">
                <h3>Product Preview</h3>
                <button class="close-preview" onclick="closePreview()">×</button>
            </div>
            <div id="previewContent"></div>
        </div>
    </div>

    <script src="product-form.js"></script>
</body>
</html>
